<a href="{% url url %}" class="tool-card {{ cat }}" data-name="{{ name|lower }}" data-section="{{ section }}">
  <div class="tc-icon"><i class="fa-solid {{ icon }}"></i></div>
  <div class="tc-body">
    <div class="tc-name">{{ name }}</div>
    <div class="tc-desc">{{ desc }}</div>
  </div>
  <i class="fa-solid fa-arrow-right tc-arrow"></i>
</a>
